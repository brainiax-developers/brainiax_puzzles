name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  analyze_and_test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    # Skip this job on tag pushes (we only want build_apk then)
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.5

      - name: Cache pub (optional)
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            **/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Bootstrap workspace (root)
        run: |
          dart pub get
          dart pub global activate melos
          melos bootstrap

      - name: Analyze (root)
        run: melos analyze

      - name: Test (root)
        run: melos test

      - name: Coverage (app)
        run: melos run coverage

      - name: Enforce coverage threshold
        run: melos run check_coverage

      - name: Performance gate
        run: melos run perf_gate

  build_apk:
    name: Build debug APK (on tag)
    runs-on: ubuntu-latest
    # Only run when pushing tags like v1.2.3
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.5

      - name: Cache pub (optional)
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            **/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Bootstrap workspace (root)
        run: |
          dart pub get
          dart pub global activate melos
          melos bootstrap

      - name: Get app deps
        working-directory: apps/app
        run: flutter pub get

      - name: Build debug APK
        working-directory: apps/app
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: apps/app/build/app/outputs/flutter-apk/app-debug.apk
