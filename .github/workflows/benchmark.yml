name: Performance Benchmark

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Dart
      uses: dart-lang/setup-dart@v1
      with:
        sdk: stable
        
    - name: Install dependencies
      run: dart pub get
      
    - name: Run benchmarks
      run: |
        # Run benchmarks and save results
        dart bin/bench.dart \
          --engines "stub,stub_sudoku" \
          --count 100 \
          --difficulty medium \
          --size "9x9" \
          --output benchmark_current.json
          
    - name: Check for regression
      run: |
        # Check if baseline exists
        if [ -f benchmark_baseline.json ]; then
          echo "Comparing against baseline..."
          dart bin/bench.dart \
            --ci \
            --baseline benchmark_baseline.json \
            --threshold 20 \
            --output benchmark_current.json
        else
          echo "No baseline found, creating one..."
          cp benchmark_current.json benchmark_baseline.json
        fi
        
    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results
        path: |
          benchmark_current.json
          benchmark_current_p95.json
          benchmark_baseline.json
          
    - name: Update baseline on main branch
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        # Update baseline with current results on main branch
        cp benchmark_current.json benchmark_baseline.json
        echo "Baseline updated with current results"
        
    - name: Comment PR with benchmark results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          try {
            const results = JSON.parse(fs.readFileSync('benchmark_current.json', 'utf8'));
            const baseline = fs.existsSync('benchmark_baseline.json') 
              ? JSON.parse(fs.readFileSync('benchmark_baseline.json', 'utf8'))
              : null;
              
            let comment = '## 📊 Performance Benchmark Results\n\n';
            
            if (baseline) {
              comment += '### Comparison with Baseline\n\n';
              comment += '| Engine | Current P95 | Baseline P95 | Change |\n';
              comment += '|--------|-------------|--------------|--------|\n';
              
              for (const [engineId, result] of Object.entries(results.results)) {
                const baselineResult = baseline.results[engineId];
                if (baselineResult && result.success && baselineResult.success) {
                  const change = ((result.p95Ms - baselineResult.p95Ms) / baselineResult.p95Ms * 100).toFixed(1);
                  const changeText = change > 0 ? `+${change}%` : `${change}%`;
                  const emoji = change > 20 ? '🔴' : change > 10 ? '🟡' : '🟢';
                  
                  comment += `| ${engineId} | ${result.p95Ms.toFixed(2)}ms | ${baselineResult.p95Ms.toFixed(2)}ms | ${emoji} ${changeText} |\n`;
                }
              }
            } else {
              comment += '### Current Results\n\n';
              comment += '| Engine | P95 | P99 | Total Time |\n';
              comment += '|--------|-----|-----|------------|\n';
              
              for (const [engineId, result] of Object.entries(results.results)) {
                if (result.success) {
                  comment += `| ${engineId} | ${result.p95Ms.toFixed(2)}ms | ${result.p99Ms.toFixed(2)}ms | ${result.totalTimeMs.toFixed(2)}ms |\n`;
                } else {
                  comment += `| ${engineId} | ❌ Failed | - | - |\n`;
                }
              }
            }
            
            comment += '\n### 📱 Device Benchmark Results\n\n';
            comment += 'For device-specific performance data, please attach the JSON output from the in-app benchmark screen:\n';
            comment += '1. Open the app and navigate to the benchmark screen (tap "Puzzle Home" 5 times)\n';
            comment += '2. Run a benchmark with your device\n';
            comment += '3. Export the JSON results and attach to this PR\n\n';
            comment += 'This will provide device-specific performance metrics for comparison.\n\n';
            comment += '---\n';
            comment += '*This comment was automatically generated by the benchmark workflow.*';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          } catch (error) {
            console.log('Failed to create benchmark comment:', error);
          }
