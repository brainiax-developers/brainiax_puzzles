name: brainiax_workspace
publish_to: none

environment:
  sdk: ^3.9.0

# This is the IMPORTANT bit for discovery:
workspace:
  - apps/app
  - packages/assets
  - packages/puzzle_core

dependencies:
  go_router: ^16.2.4
  flutter_riverpod: ^3.0.2
  firebase_core: ^4.1.1
  firebase_auth: ^6.1.0
  cloud_firestore: ^6.0.2
  firebase_remote_config: ^6.0.2
  firebase_crashlytics: ^5.0.2
  firebase_analytics: ^12.0.2
  shared_preferences: ^2.3.2
  intl: ^0.20.2

dev_dependencies:
  melos: ^7.1.1
  args: ^2.4.2
  path: ^1.8.3

# (Optional) Melos scripts live here now
melos:
  scripts:
    analyze: dart run bin/melos_analyze.dart
    test: dart run bin/melos_test.dart
    format: melos exec -c 1 -- dart format .
    coverage: melos exec --scope=app -- flutter test --no-pub --coverage --concurrency=1 test/shared test/features test/widgets test/goldens test/models test/router test/services test/widget_test.dart test/integration_test.dart test/engine_registration_test.dart
    check_coverage: dart bin/check_coverage.dart apps/app/coverage/lcov.info 0.8
    perf_gate: dart bin/bench.dart --engines "stub,stub_sudoku" --count 50 --difficulty medium --size "9x9" --output benchmark_current.json --ci --baseline benchmarks/phase2_baseline.json --threshold 0
