name: brainiax_workspace
publish_to: none

environment:
  sdk: ^3.9.0

# This is the IMPORTANT bit for discovery:
workspace:
  - apps/app
  - packages/assets
  - packages/puzzle_core

dependencies:
  go_router: ^16.2.4
  flutter_riverpod: ^3.0.2
  firebase_core: ^4.1.1
  firebase_auth: ^6.1.0
  cloud_firestore: ^6.0.2
  firebase_remote_config: ^6.0.2
  firebase_crashlytics: ^5.0.2
  firebase_analytics: ^12.0.2
  shared_preferences: ^2.3.2
  intl: ^0.20.2

dev_dependencies:
  melos: ^7.1.1

# (Optional) Melos scripts live here now
melos:
  scripts:
    analyze: melos exec -c 1 -- flutter analyze || dart analyze
    test: melos exec -c 1 -- flutter test --no-pub || dart test
    format: melos exec -c 1 -- dart format . --fix
