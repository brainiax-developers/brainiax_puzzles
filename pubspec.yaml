name: brainiax_workspace
publish_to: none

environment:
  sdk: ^3.9.0

# This is the IMPORTANT bit for discovery:
workspace:
  - apps/app
  - packages/assets
  - packages/puzzle_core

dependencies:
  go_router: ^14.2.1
  flutter_riverpod: ^2.5.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_remote_config: ^5.1.5
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.5
  shared_preferences: ^2.3.2
  intl: ^0.19.0

dev_dependencies:
  melos: ^7.1.1

# (Optional) Melos scripts live here now
melos:
  scripts:
    analyze: melos exec -c 1 -- flutter analyze || dart analyze
    test: melos exec -c 1 -- flutter test --no-pub || dart test
    format: melos exec -c 1 -- dart format . --fix
